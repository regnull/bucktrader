site_name: Bucktrader
site_description: Event-driven algorithmic trading framework for backtesting and live trading
repo_name: bucktrader

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Quick Start: quickstart.md
  - Guides:
      - Overview: specs/01-overview.md
      - Lines System: specs/02-lines-system.md
      - Component Model: specs/03-component-model.md
      - Cortex Engine: specs/04-cortex.md
      - Data Feeds: specs/05-data-feeds.md
      - Strategies: specs/06-strategies.md
      - Indicators: specs/07-indicators.md
      - Broker: specs/08-broker.md
      - Analyzers & Observers: specs/09-analyzers-observers.md
      - Live Trading: specs/10-live-trading.md
      - Plotting: specs/11-plotting.md
      - Error Handling: specs/12-error-handling.md
      - Optimization: optimization.md
      - Example Strategies: examples.md
  - API Reference:
      - API Overview: api/index.md
      - bucktrader.cortex: api/cortex.md
      - bucktrader.strategy: api/strategy.md
      - bucktrader.broker: api/broker.md
      - bucktrader.feed: api/feed.md
      - bucktrader.indicator: api/indicator.md
      - bucktrader.analyzer: api/analyzer.md
      - bucktrader.observer: api/observer.md
      - bucktrader.order: api/order.md
      - bucktrader.trade: api/trade.md
